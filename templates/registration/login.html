{% extends "base.html" %}
{% block title %}เข้าสู่ระบบ — ONG หลอมทอง{% endblock %}
{% block full %}
<div style="min-height:100vh;display:grid;place-items:center;padding:24px">
  <form method="post" class="card" style="width:min(400px,92vw);text-align:center;border-radius:24px">
    {% csrf_token %}
    <div class="coin" style="width:110px;height:110px;font-size:34px;margin:6px auto 14px">ONG</div>
    <h1 style="margin:6px 0 2px;font-weight:600" class="gold">ONG หลอมทอง</h1>
    <p class="muted" style="margin:0 0 18px;font-size:13px">ระบบบริหารจัดการร้านทอง</p>
    {% if form.errors %}<div class="msg err">ชื่อผู้ใช้หรือรหัสผ่านไม่ถูกต้อง</div>{% endif %}
    <div style="text-align:left"><label>ชื่อผู้ใช้</label>{{ form.username }}</div>
    <div style="text-align:left"><label>รหัสผ่าน</label>{{ form.password }}</div>
    <button class="btn wide" style="margin-top:18px" type="submit">เข้าสู่ระบบ</button>
  </form>
</div>
{% endblock %}
