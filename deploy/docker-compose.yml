# ระบบร้านทอง ONG หลอมทอง — production stack
# ใช้: (จากโฟลเดอร์ ong_system/)  docker compose -f deploy/docker-compose.yml --env-file deploy/.env up -d --build
name: ong-goldshop

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 5
    # ไม่ publish port ออกนอก (เข้าถึงเฉพาะภายใน network)

  web:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
      POSTGRES_PORT: "5432"
    volumes:
      - media:/app/media
      - static:/app/staticfiles
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/healthz/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 40s

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static:/app/staticfiles:ro
      - media:/app/media:ro
      - ./nginx/certs:/etc/nginx/certs:ro   # วางใบรับรอง TLS ที่นี่ (fullchain.pem, privkey.pem)
    depends_on:
      - web

  # สำรองข้อมูลอัตโนมัติ (pg_dump + media) ทุกวัน — เก็บใน ./backups
  backup:
    image: postgres:16-alpine
    restart: unless-stopped
    env_file: .env
    environment:
      POSTGRES_HOST: db
    volumes:
      - ./scripts/backup.sh:/backup.sh:ro
      - ./backups:/backups
      - media:/app/media:ro
    depends_on:
      db:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache tzdata >/dev/null 2>&1 || true
        echo "backup service: รันสำรองข้อมูลทุกวันเวลา ${BACKUP_HOUR:-02}:00 (Asia/Bangkok)"
        while true; do
          NOW=$$(TZ=Asia/Bangkok date +%H%M)
          if [ "$$NOW" = "${BACKUP_HOUR:-02}00" ]; then
            sh /backup.sh || echo "backup failed"
            sleep 90
          fi
          sleep 30
        done

volumes:
  pgdata:
  media:
  static:
