# nginx — reverse proxy (HTTP). สำหรับ HTTPS ดู nginx-https.conf.example
upstream ong_web {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    client_max_body_size 20m;   # รองรับอัปโหลดรูปบัตร/ชิ้นงาน

    # static/media เสิร์ฟตรงจาก volume (เร็วกว่าให้ Django เสิร์ฟ)
    location /static/ {
        alias /app/staticfiles/;
        expires 7d;
        access_log off;
    }
    location /media/ {
        alias /app/media/;
        expires 7d;
    }

    location /healthz/ {
        proxy_pass http://ong_web;
        access_log off;
    }

    location / {
        proxy_pass http://ong_web;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_redirect off;
    }
}
